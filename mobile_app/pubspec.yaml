name: tripmate_mobile
description: Fleet management mobile apps with separate driver and transporter entrypoints.
publish_to: none

version: 1.0.4+3060

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  dio: ^5.8.0+1
  package_info_plus: ^8.3.0
  path_provider: ^2.1.5
  open_file: ^3.5.10
  provider: ^6.1.2
  google_fonts: ^6.3.2
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.14.0
  geolocator: ^13.0.1
  shared_preferences: 2.5.3
  share_plus: ^10.1.4
  permission_handler: ^11.4.0
  flutter_local_notifications: ^17.2.3
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/tripmate_icon.png
    - assets/branding/tripmate_wordmark.png
